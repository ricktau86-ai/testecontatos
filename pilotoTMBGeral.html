<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <title>TMB — Contactos & Frota</title>
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #18181f;
      --surface3: #1e1e27;
      --border: rgba(255,255,255,0.06);
      --border-accent: rgba(99,102,241,0.4);
      --accent: #818cf8;
      --accent2: #a78bfa;
      --accent-glow: rgba(129,140,248,0.15);
      --accent-soft: rgba(129,140,248,0.1);
      --green: #34d399;
      --red: #fb7185;
      --orange: #fb923c;
      --text: #e2e8f0;
      --text2: #94a3b8;
      --text3: #64748b;
      --radius-sm: 8px;
      --radius: 14px;
      --radius-lg: 20px;
      --font-display: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── NOISE TEXTURE OVERLAY ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ── LOGIN SCREEN ── */
    #loginScreen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      background: var(--bg);
      padding: 20px;
    }

    #loginScreen::before {
      content: '';
      position: absolute;
      top: -200px; left: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(129,140,248,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    #loginScreen::after {
      content: '';
      position: absolute;
      bottom: -150px; right: -100px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(167,139,250,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .login-card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 40px 36px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 32px 64px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04);
      animation: loginSlideIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    @keyframes loginSlideIn {
      from { opacity: 0; transform: translateY(24px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .login-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .login-logo-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
      color: #fff;
      box-shadow: 0 8px 24px rgba(129,140,248,0.35);
    }

    .login-logo-text {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1.4rem;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .login-logo-text span {
      color: var(--accent);
    }

    .login-title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }

    .login-subtitle {
      font-size: 0.875rem;
      color: var(--text2);
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .login-field {
      margin-bottom: 14px;
    }

    .login-field label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text2);
      margin-bottom: 6px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .login-field input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 11px 14px;
      font-family: var(--font-body);
      font-size: 0.9rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .login-field input::placeholder { color: var(--text3); }
    .login-field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(129,140,248,0.15);
    }

    .login-btn {
      width: 100%;
      margin-top: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 13px;
      font-family: var(--font-display);
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 8px 24px rgba(129,140,248,0.3);
    }

    .login-btn:hover { opacity: 0.92; transform: translateY(-1px); box-shadow: 0 12px 28px rgba(129,140,248,0.4); }
    .login-btn:active { transform: translateY(0); }
    .login-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .login-error {
      margin-top: 12px;
      padding: 10px 14px;
      background: rgba(251,113,133,0.1);
      border: 1px solid rgba(251,113,133,0.25);
      border-radius: var(--radius-sm);
      font-size: 0.82rem;
      color: var(--red);
      display: none;
    }

    .login-error.visible { display: block; }

    .login-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 20px;
      padding: 6px 12px;
      background: rgba(52,211,153,0.08);
      border: 1px solid rgba(52,211,153,0.2);
      border-radius: 999px;
      font-size: 0.75rem;
      color: var(--green);
    }

    /* ── LOADING SCREEN ── */
    #loadingScreen {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 99;
      background: var(--bg);
    }

    #loadingScreen.visible { display: flex; }

    .loading-inner {
      text-align: center;
      animation: fadeIn 0.3s ease;
    }

    .loading-spinner {
      width: 44px; height: 44px;
      border: 3px solid var(--surface3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .loading-text {
      font-size: 0.9rem;
      color: var(--text2);
      font-weight: 300;
    }

    /* ── MAIN APP ── */
    #appScreen {
      display: none;
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    #appScreen.visible { display: block; }

    /* ── TOPBAR ── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .topbar-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem;
      color: #fff;
      box-shadow: 0 4px 12px rgba(129,140,248,0.3);
    }

    .topbar-name {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.05rem;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .topbar-name span { color: var(--accent); }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .admin-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: var(--text3);
    }

    .admin-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text3);
      flex-shrink: 0;
    }

    .admin-dot.active { background: var(--green); box-shadow: 0 0 6px var(--green); }

    .btn-admin {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid var(--border-accent);
      background: var(--accent-soft);
      color: var(--accent);
      font-family: var(--font-body);
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s, box-shadow 0.2s;
    }

    .btn-admin:hover { background: rgba(129,140,248,0.18); box-shadow: 0 0 0 1px rgba(129,140,248,0.3); }
    .btn-admin.active { background: linear-gradient(135deg,rgba(129,140,248,0.25),rgba(167,139,250,0.2)); color: var(--accent2); }

    /* ── CONTENT ── */
    .content {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    /* ── TABS ── */
    .tabs-nav {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 4px;
      width: fit-content;
    }

    .tab-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 18px;
      border-radius: 10px;
      border: none;
      background: transparent;
      color: var(--text3);
      font-family: var(--font-body);
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.2s, background 0.2s;
    }

    .tab-btn i { font-size: 0.85rem; }

    .tab-btn.active {
      background: var(--surface3);
      color: var(--text);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .tab-btn:not(.active):hover { color: var(--text2); background: rgba(255,255,255,0.04); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; animation: panelIn 0.25s ease; }

    @keyframes panelIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    /* ── SEARCH BAR ── */
    .filters-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .search-box {
      flex: 1;
      min-width: 220px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-box:focus-within {
      border-color: var(--border-accent);
      box-shadow: 0 0 0 3px rgba(129,140,248,0.1);
    }

    .search-box i { color: var(--text3); font-size: 0.82rem; flex-shrink: 0; }

    .search-input {
      flex: 1;
      border: none;
      background: transparent;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.88rem;
      outline: none;
    }

    .search-input::placeholder { color: var(--text3); }

    /* ── CHIPS ── */
    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 11px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text3);
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .chip:hover { border-color: rgba(255,255,255,0.12); color: var(--text2); }

    .chip.active {
      border-color: var(--border-accent);
      background: var(--accent-soft);
      color: var(--accent);
      box-shadow: 0 0 0 1px rgba(129,140,248,0.2);
    }

    /* ── SUMMARY ── */
    .summary {
      font-size: 0.78rem;
      color: var(--text3);
      margin-bottom: 12px;
      letter-spacing: 0.01em;
    }

    /* ── CARDS GRID ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }

    /* ── CONTACT CARD ── */
    .contact-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
      position: relative;
      overflow: hidden;
    }

    .contact-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      opacity: 0;
      transition: opacity 0.2s;
    }

    .contact-card:hover {
      border-color: var(--border-accent);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3), 0 0 0 1px rgba(129,140,248,0.08);
      transform: translateY(-1px);
    }

    .contact-card:hover::before { opacity: 1; }

    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }

    .card-head-left { flex: 1; min-width: 0; }

    .card-name {
      font-family: var(--font-display);
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: -0.01em;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 5px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 500;
      border: 1px solid var(--border);
      color: var(--text3);
      background: var(--surface2);
      white-space: nowrap;
    }

    .pill--origem {
      border-color: rgba(129,140,248,0.3);
      color: var(--accent);
      background: rgba(129,140,248,0.08);
    }

    .pill--temp {
      border-color: rgba(52,211,153,0.3);
      color: var(--green);
      background: rgba(52,211,153,0.08);
    }

    .icon-btn {
      width: 30px; height: 30px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text3);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 0.78rem;
      flex-shrink: 0;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }

    .icon-btn:hover { border-color: var(--border-accent); color: var(--accent); background: var(--accent-soft); }

    /* ── CARD BODY LINES ── */
    .card-body {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 0.81rem;
    }

    .info-line {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text2);
      line-height: 1.4;
    }

    .info-line i {
      font-size: 0.72rem;
      color: var(--text3);
      width: 14px;
      text-align: center;
      flex-shrink: 0;
    }

    .info-line a {
      color: var(--accent);
      text-decoration: none;
    }

    .info-line a:hover { text-decoration: underline; }

    .info-val { font-weight: 500; color: var(--text); }

    /* ── PHONES ── */
    .phones { display: flex; flex-direction: column; gap: 5px; margin-top: 2px; }

    .phone-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .phone-label {
      font-size: 0.72rem;
      color: var(--text3);
      font-weight: 500;
      min-width: 70px;
      flex-shrink: 0;
    }

    .phone-actions { display: flex; align-items: center; gap: 6px; }

    .phone-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.81rem;
      font-weight: 500;
    }

    .phone-link i { font-size: 0.7rem; }
    .phone-link:hover { text-decoration: underline; }

    .wa-btn {
      width: 24px; height: 24px;
      border-radius: 6px;
      background: rgba(52,211,153,0.12);
      border: 1px solid rgba(52,211,153,0.25);
      color: var(--green);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-size: 0.78rem;
      transition: background 0.15s;
    }

    .wa-btn:hover { background: rgba(52,211,153,0.2); }

    /* ── CARD FOOTER ACTIONS ── */
    .card-footer {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      padding-top: 6px;
      border-top: 1px solid var(--border);
      margin-top: 2px;
    }

    .text-btn {
      border: none;
      background: none;
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      padding: 2px 0;
      transition: color 0.15s;
    }

    .text-btn--edit { color: var(--accent); }
    .text-btn--edit:hover { color: var(--accent2); }
    .text-btn--del { color: var(--text3); }
    .text-btn--del:hover { color: var(--red); }

    /* ── VEHICLE CARD ── */
    .vehicle-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
    }

    .vehicle-card:hover {
      border-color: var(--border-accent);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      transform: translateY(-1px);
    }

    .plate-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 5px 10px;
      width: fit-content;
    }

    .plate-flag {
      font-size: 0.65rem;
      background: #003399;
      color: #fff;
      padding: 2px 5px;
      border-radius: 4px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .plate-text {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--text);
    }

    .vehicle-subtitle {
      font-size: 0.78rem;
      color: var(--text3);
      margin-top: 3px;
    }

    /* ── NO RESULTS ── */
    .no-results {
      color: var(--text3);
      font-size: 0.88rem;
      padding: 24px 0;
      text-align: center;
    }

    /* ── ADD BUTTON ── */
    .btn-add {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid var(--border-accent);
      background: var(--accent-soft);
      color: var(--accent);
      font-family: var(--font-body);
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
      white-space: nowrap;
    }

    .btn-add:hover { background: rgba(129,140,248,0.18); box-shadow: 0 0 0 1px rgba(129,140,248,0.3); }

    /* ── IMPORT INPUT hidden behind admin btn ── */
    .import-wrap { position: relative; display: inline-flex; align-items: center; }
    .import-input {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 10;
      width: 100%; height: 100%;
    }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 80;
      padding: 16px;
    }

    .modal-overlay.visible { display: flex; animation: fadeIn 0.2s ease; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px 20px 16px;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
      animation: loginSlideIn 0.25s cubic-bezier(0.34,1.56,0.64,1) both;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      flex-shrink: 0;
    }

    .modal-title {
      font-family: var(--font-display);
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .modal-close {
      width: 28px; height: 28px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text3);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      transition: color 0.15s, background 0.15s;
    }

    .modal-close:hover { color: var(--text); background: var(--surface3); }

    .modal-body {
      overflow-y: auto;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-right: 2px;
    }

    .modal-row { display: flex; flex-direction: column; gap: 5px; }

    .modal-row label {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text3);
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .modal-row input,
    .modal-row select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 9px 12px;
      font-family: var(--font-body);
      font-size: 0.85rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .modal-row input::placeholder { color: var(--text3); }
    .modal-row select option { background: var(--surface2); }

    .modal-row input:focus,
    .modal-row select:focus {
      border-color: var(--border-accent);
      box-shadow: 0 0 0 3px rgba(129,140,248,0.1);
    }

    .modal-row-inline {
      display: grid;
      grid-template-columns: 1fr 1.4fr;
      gap: 8px;
    }

    .modal-row .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: var(--text2);
    }

    .modal-row .checkbox-row input[type="checkbox"] {
      width: 15px; height: 15px;
      accent-color: var(--accent);
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 14px;
      flex-shrink: 0;
    }

    .btn-secondary {
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text2);
      font-family: var(--font-body);
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .btn-secondary:hover { background: var(--surface2); color: var(--text); }

    .btn-primary {
      padding: 8px 18px;
      border-radius: var(--radius-sm);
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-family: var(--font-display);
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      box-shadow: 0 4px 12px rgba(129,140,248,0.25);
    }

    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--surface3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 500;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 200;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    #toast.visible { opacity: 1; transform: translateY(0); }

    @media (max-width: 680px) {
      .topbar { padding: 0 14px; }
      .topbar-name { display: none; }
      .content { padding: 16px 12px 32px; }
      .tabs-nav { width: 100%; }
      .tab-btn { flex: 1; justify-content: center; }
      .cards { grid-template-columns: 1fr; }
      .filters-row { flex-direction: column; align-items: stretch; }
      .admin-status .admin-label { display: none; }
      #toast { left: 12px; right: 12px; text-align: center; }
    }
  </style>

  <script>
    // Fallbacks
    if (typeof CONTACTS === 'undefined') window.CONTACTS = [];

    const db = typeof _tmbDb !== 'undefined' ? _tmbDb : null;

    // ── UI REFS ──
    const loginScreen   = document.getElementById('loginScreen');

    let toastTimeout;

    // ── TOAST ──
    function showToast(msg) {
      if (!toastEl) return;
      toastEl.textContent = msg;
      toastEl.classList.add('visible');
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => toastEl.classList.remove('visible'), 2200);
    }

    function fallbackCopyText(text) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed'; ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      try { document.execCommand('copy'); showToast('Copiado!'); } catch(e) {}
      document.body.removeChild(ta);
    }

    // ── DATE / AGE HELPERS ──
    function parseISODate(v) {
      if (!v) return null;
      const d = new Date(v);
      return isNaN(d.getTime()) ? null : d;
    }
    function formatDatePt(v) {
      const d = parseISODate(v);
      if (!d) return '';
      try { return d.toLocaleDateString('pt-PT'); } catch(e) {
        return String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + d.getFullYear();
      }
    }
    function calcAgeYears(v) {
      const d = parseISODate(v);
      if (!d) return '';
      const t = new Date();
      let a = t.getFullYear() - d.getFullYear();
      const mm = t.getMonth() - d.getMonth();
      if (mm < 0 || (mm === 0 && t.getDate() < d.getDate())) a--;
      return a >= 0 ? a : '';
    }
    function parseMonthYear(v) {
      if (!v) return null;
      const s = String(v).trim();
      const m = s.match(/^\s*(\d{1,2})\s*[\/\-.]\s*(\d{4})\s*$/);
      if (!m) return null;
      const month = parseInt(m[1], 10), year = parseInt(m[2], 10);
      if (month < 1 || month > 12 || year < 1900 || year > 3000) return null;
      return { month, year };
    }
    function normalizeMonthYear(v) {
      const p = parseMonthYear(v);
      if (!p) return '';
      return String(p.month).padStart(2,'0') + '/' + p.year;
    }
    function normalizeVehicleDateForInput(v) {
      const s = (v || '').toString().trim();
      if (!s) return '';
      const n = normalizeMonthYear(s);
      if (n) return n;
      const d = parseISODate(s);
      if (d) return String(d.getMonth()+1).padStart(2,'0') + '/' + d.getFullYear();
      return s;
    }
    function calcVehicleAgeYears(v) {
      if (!v) return '';
      const p = parseMonthYear(v);
      if (p) {
        const t = new Date();
        let a = t.getFullYear() - p.year;
        if ((t.getMonth()+1) - p.month < 0) a--;
        return a >= 0 ? a : '';
      }
      return calcAgeYears(v);
    }
    function normalizePhone(n) { return (n||'').replace(/\s+/g,''); }

    // ── TABS ──
    const tabBtns   = document.querySelectorAll('.tab-btn');
    const tabPanels = document.querySelectorAll('.tab-panel');
    tabBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        tabBtns.forEach(b => b.classList.remove('active'));
        tabPanels.forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.target).classList.add('active');
      });
    });

    // ══════════════════════════════════════════
    // CONTACTS
    // ══════════════════════════════════════════
    const STORAGE_KEY_C = 'tmb_contacts_v2';
    let contactsData = [];
    let activeOrigem = 'todos';
    let currentTermC = '';
    let editingContact = null;

    const searchContactsInput = document.getElementById('searchContacts');
    const cardsContacts       = document.getElementById('cardsContacts');
    const summaryContacts     = document.getElementById('summaryContacts');
    const chipsContacts       = Array.from(document.querySelectorAll('#chipGroupContacts .chip'));

    // Modal refs
    const contactModalOverlay   = document.getElementById('contactModalOverlay');
    const contactForm           = document.getElementById('contactForm');
    const contactModalTitle     = document.getElementById('contactModalTitle');
    const contactModalCloseBtn  = document.getElementById('contactModalCloseBtn');
    const contactModalCancelBtn = document.getElementById('contactModalCancelBtn');
    const inputCNome      = document.getElementById('contactNome');
    const inputCOrigem    = document.getElementById('contactOrigem');
    const inputCCategoria = document.getElementById('contactCategoria');
    const inputCLocal     = document.getElementById('contactLocal');
    const inputCEmail     = document.getElementById('contactEmail');
    const inputCNasc      = document.getElementById('contactNascimento');
    const inputCPhone1L   = document.getElementById('contactPhone1Label');
    const inputCPhone1N   = document.getElementById('contactPhone1Number');
    const inputCPhone2L   = document.getElementById('contactPhone2Label');
    const inputCPhone2N   = document.getElementById('contactPhone2Number');

    function cloneContactsFromConst() {
      if (!Array.isArray(CONTACTS)) return [];
      return CONTACTS.map(c => ({
        origem: c.origem||'', nome: c.nome||'', categoria: c.categoria||'',
        local: c.local||'', email: c.email||'',
        data_nascimento: c.data_nascimento||c.dataNascimento||c.nascimento||'',
        telefones: Array.isArray(c.telefones) ? c.telefones.map(p => ({label:(p&&p.label)||'', numero:(p&&p.numero)||''})) : []
      }));
    }
    function loadContactsData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY_C);
        if (raw) { const p = JSON.parse(raw); if (Array.isArray(p)) return p; }
      } catch(e) {}
      return cloneContactsFromConst();
    }
    function saveContactsData() {
      try { localStorage.setItem(STORAGE_KEY_C, JSON.stringify(contactsData)); } catch(e) {}
    }
    contactsData = loadContactsData();

    function matchesOrigemC(c, o) { return o === 'todos' || c.origem === o; }
    function matchesTermC(c, t) {
      if (!t) return true;
      const lc = t.toLowerCase();
      const fields = [c.nome, c.categoria, c.origem, c.local, c.email, c.data_nascimento];
      if (Array.isArray(c.telefones)) c.telefones.forEach(p => { fields.push(p&&p.numero, p&&p.label); });
      return fields.some(v => v && v.toString().toLowerCase().includes(lc));
    }

    function buildNavUrls(loc) {
      const q = encodeURIComponent((loc||'').trim());
      return { gmaps: 'https://www.google.com/maps/search/?api=1&query='+q, waze: 'https://waze.com/ul?q='+q+'&navigate=yes' };
    }
    function openLocationNav(loc) {
      const urls = buildNavUrls(loc);
      const useWaze = window.confirm('Abrir no Waze?\n\nOK = Waze\nCancelar = Google Maps');
      const w = window.open(useWaze ? urls.waze : urls.gmaps, '_blank');
      if (w) w.opener = null;
    }

    function renderContacts(items) {
      cardsContacts.innerHTML = '';
      if (!items.length) { cardsContacts.innerHTML = '<p class="no-results">Nenhum contacto encontrado.</p>'; return; }
      const frag = document.createDocumentFragment();
      items.forEach(contact => {
        const card = document.createElement('article');
        card.className = 'contact-card';

        const nome     = contact.nome || '(sem nome)';
        const origem   = contact.origem || '';
        const categoria = contact.categoria || '';
        const local    = contact.local || '';
        const email    = contact.email && contact.email !== 'nan' ? contact.email : '';
        const dob      = (contact.data_nascimento) || '';
        const dobFmt   = formatDatePt(dob);
        const dobAge   = calcAgeYears(dob);

        // Head
        const head = document.createElement('div'); head.className = 'card-head';
        const headLeft = document.createElement('div'); headLeft.className = 'card-head-left';
        const nameEl = document.createElement('div'); nameEl.className = 'card-name'; nameEl.textContent = nome;
        headLeft.appendChild(nameEl);
        const pillRow = document.createElement('div'); pillRow.className = 'pill-row';
        if (origem) { const p = document.createElement('span'); p.className = 'pill pill--origem'; p.textContent = origem; pillRow.appendChild(p); }
        if (categoria && categoria !== 'nan') { const p = document.createElement('span'); p.className = 'pill'; p.textContent = categoria; pillRow.appendChild(p); }
        headLeft.appendChild(pillRow);
        const copyBtn = document.createElement('button'); copyBtn.type = 'button'; copyBtn.className = 'icon-btn'; copyBtn.title = 'Copiar cartão';
        copyBtn.innerHTML = '<i class="fa-regular fa-copy"></i>';
        copyBtn.addEventListener('click', () => copyContact(contact));
        head.appendChild(headLeft); head.appendChild(copyBtn);

        // Body
        const body = document.createElement('div'); body.className = 'card-body';

        if (local) {
          const line = document.createElement('div'); line.className = 'info-line';
          const icon = document.createElement('i'); icon.className = 'fa-solid fa-location-dot';
          const a = document.createElement('a'); a.className = 'map-link';
          a.href = buildNavUrls(local).gmaps; a.target = '_blank'; a.rel = 'noopener';
          a.textContent = local; a.title = 'Abrir no mapa';
          a.addEventListener('click', e => { e.preventDefault(); openLocationNav(local); });
          line.appendChild(icon); line.appendChild(a); body.appendChild(line);
        }
        if (email) {
          const line = document.createElement('div'); line.className = 'info-line';
          const icon = document.createElement('i'); icon.className = 'fa-solid fa-envelope';
          const a = document.createElement('a'); a.href = 'mailto:'+email; a.textContent = email;
          line.appendChild(icon); line.appendChild(a); body.appendChild(line);
        }
        if (dobFmt) {
          const line = document.createElement('div'); line.className = 'info-line';
          const icon = document.createElement('i'); icon.className = 'fa-solid fa-calendar-days';
          const span = document.createElement('span');
          span.textContent = 'Nascimento: ' + dobFmt + (dobAge !== '' ? ' · ' + dobAge + ' anos' : '');
          line.appendChild(icon); line.appendChild(span); body.appendChild(line);
        }

        if (Array.isArray(contact.telefones) && contact.telefones.length) {
          const phonesDiv = document.createElement('div'); phonesDiv.className = 'phones';
          contact.telefones.forEach(p => {
            if (!p || !p.numero) return;
            const pLine = document.createElement('div'); pLine.className = 'phone-line';
            const labelSpan = document.createElement('span'); labelSpan.className = 'phone-label'; labelSpan.textContent = p.label || '';
            const acts = document.createElement('span'); acts.className = 'phone-actions';
            const link = document.createElement('a'); link.className = 'phone-link';
            link.href = 'tel:' + normalizePhone(p.numero);
            const pIcon = document.createElement('i'); pIcon.className = 'fa-solid fa-phone';
            const pNum = document.createElement('span'); pNum.textContent = p.numero;
            link.appendChild(pIcon); link.appendChild(pNum); acts.appendChild(link);
            const raw = normalizePhone(p.numero || '');
            if (raw) {
              let wa = raw;
              if (wa.startsWith('+')) wa = wa.slice(1); else if (wa.startsWith('00')) wa = wa.slice(2);
              if (!wa.startsWith('351')) wa = '351' + wa;
              const waBtn = document.createElement('a'); waBtn.className = 'wa-btn';
              waBtn.href = 'https://wa.me/' + wa; waBtn.target = '_blank'; waBtn.rel = 'noopener noreferrer';
              waBtn.title = 'WhatsApp'; waBtn.innerHTML = '<i class="fa-brands fa-whatsapp"></i>';
              acts.appendChild(waBtn);
            }
            pLine.appendChild(labelSpan); pLine.appendChild(acts); phonesDiv.appendChild(pLine);
          });
          body.appendChild(phonesDiv);
        }

        // Footer
        const footer = document.createElement('div'); footer.className = 'card-footer';
        const editBtn = document.createElement('button'); editBtn.type = 'button'; editBtn.className = 'text-btn text-btn--edit'; editBtn.textContent = 'Editar';
        editBtn.addEventListener('click', () => openContactModal(contact));
        const delBtn = document.createElement('button'); delBtn.type = 'button'; delBtn.className = 'text-btn text-btn--del'; delBtn.textContent = 'Apagar';
        delBtn.addEventListener('click', () => deleteContact(contact));
        footer.appendChild(editBtn); footer.appendChild(delBtn);

        card.appendChild(head); card.appendChild(body); card.appendChild(footer);
        frag.appendChild(card);
      });
      cardsContacts.appendChild(frag);
    }

    function applyFiltersContacts() {
      if (!Array.isArray(contactsData) || !contactsData.length) {
        cardsContacts.innerHTML = '<p class="no-results">Nenhum contacto carregado.</p>';
        if (summaryContacts) summaryContacts.textContent = '';
        return;
      }
      const filtered = contactsData.filter(c => matchesOrigemC(c, activeOrigem) && matchesTermC(c, currentTermC));
      renderContacts(filtered);
      const n = filtered.length, total = contactsData.length;
      if (summaryContacts) summaryContacts.textContent = (!currentTermC && activeOrigem === 'todos') ? `A mostrar ${n} contactos.` : `A mostrar ${n} de ${total} contactos.`;
    }

    function copyContact(contact) {
      if (!contact) return;
      const lines = [];
      if (contact.nome) lines.push('Nome: ' + contact.nome);
      if (contact.origem) lines.push('Origem: ' + contact.origem);
      if (contact.categoria) lines.push('Categoria: ' + contact.categoria);
      if (contact.local) lines.push('Local: ' + contact.local);
      if (contact.email) lines.push('Email: ' + contact.email);
      if (contact.data_nascimento) { const f = formatDatePt(contact.data_nascimento), a = calcAgeYears(contact.data_nascimento); lines.push('Nascimento: '+(f||contact.data_nascimento)+(a!==''?' ('+a+' anos)':'')); }
      if (Array.isArray(contact.telefones)) contact.telefones.forEach(p => { if (p&&p.numero) lines.push((p.label||'Telefone')+': '+p.numero); });
      const text = lines.join('\n');
      if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(text).then(()=>showToast('Cartão copiado!')).catch(()=>fallbackCopyText(text));
      else fallbackCopyText(text);
    }

    function openContactModal(contact) {
      editingContact = contact || null;

    function copyVehicle(v) {

      const text = lines.join('\n');

    // ══════════════════════════════════════════
    // IMPORT CONTACTS FROM EXCEL/CSV (original logic preserved)
    // ══════════════════════════════════════════
    function _hdrKey(v){return(v||'').toString().trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ');}
    function _toISODatePt(value){if(!value)return'';if(value instanceof Date&&!Number.isNaN(value.getTime())){const y=value.getFullYear(),m=String(value.getMonth()+1).padStart(2,'0'),d=String(value.getDate()).padStart(2,'0');return`${y}-${m}-${d}`;}const s=String(value).trim();const m=s.match(/^(\d{1,2})[.\-\/](\d{1,2})[.\-\/](\d{4})$/);if(m){return`${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;}const d2=new Date(s);if(!Number.isNaN(d2.getTime())){return`${d2.getFullYear()}-${String(d2.getMonth()+1).padStart(2,'0')}-${String(d2.getDate()).padStart(2,'0')}`;}return'';}
    function _cleanEmail(v){if(!v)return'';const s=String(v).trim();return s?s.replace(/\s+/g,''):'';}
    function _splitPhone(raw,baseLabel){const s=(raw||'').toString().trim();if(!s)return null;const digits=s.replace(/[^0-9+]/g,'');const note=s.replace(/[0-9+\s]/g,'').replace(/[-_.]+/g,' ').trim();return{label:baseLabel+(note?' ('+note+')':''),numero:digits||s};}
    function _guessOrigem(categoria,posto){const cat=(categoria||'').toString().toLowerCase(),pos=(posto||'').toString().toLowerCase();return(cat.includes('motorista')||cat.includes('ajudante')||pos.includes('recheio')||pos.includes('tir')||pos.includes('zolve')||pos.includes('sr '))?'Motorista/Ajudante':'Escritório';}
    function _excelToContactsAOA(aoa){let headerRow=-1;for(let i=0;i<Math.min(aoa.length,50);i++){const row=(aoa[i]||[]).map(_hdrKey);if(row.includes('motorista')&&row.includes('nome')&&row.includes('categoria')){headerRow=i;break;}}if(headerRow===-1)throw new Error('Cabeçalhos não encontrados.');const headers=(aoa[headerRow]||[]).map(_hdrKey);const idx={};headers.forEach((h,i)=>{if(h)idx[h]=i;});const col=(key,row)=>{const i=idx[key];return(i===undefined)?'':(row&&row[i]!==undefined?row[i]:'');};const out=[];for(let r=headerRow+1;r<aoa.length;r++){const row=aoa[r];if(!row)continue;const idRaw=col('motorista',row),nomeRaw=col('nome',row);const id=(idRaw||'').toString().trim(),nome=(nomeRaw||'').toString().trim();if(!id&&!nome)continue;const categoria=col('categoria',row),nascimento=col('nascimento',row),email=col('email',row),local=col('local',row),posto=col('posto',row),telemTmb=col('telem tmb',row),telefone=col('telefone',row),telemovel=col('telemovel',row);const origem=_guessOrigem(categoria,posto);const telefones=[];const p1=_splitPhone(telemTmb,'Telem TMB'),p2=_splitPhone(telefone,'Telefone'),p3=_splitPhone(telemovel,'Telemóvel');[p1,p2,p3].forEach(p=>{if(p&&p.numero)telefones.push(p);});out.push({origem,id_mecanografico:id,nome:id?`${id} - ${nome}`.trim():nome,categoria:(categoria||'').toString().trim(),local:[local,posto].filter(Boolean).join(' | '),posto_trabalho:(posto||'').toString().trim(),email:_cleanEmail(email),data_nascimento:_toISODatePt(nascimento),telefones,atualizado_em:new Date().toISOString(),fonte:'excel'});}return out;}

    async function importContactsFromFile(file){
      try{
        if(!file)return;
        const name=(file.name||'').toLowerCase();
        if(name.endsWith('.csv')){const text=await file.text();const lines=text.split(/\r?\n/).filter(Boolean);const aoa=lines.map(ln=>ln.split(';'));await _applyImportedContacts(_excelToContactsAOA(aoa));return;}
        if(typeof XLSX==='undefined'){showToast('Leitor Excel não disponível.');return;}
        const buf=await file.arrayBuffer();const wb=XLSX.read(buf,{type:'array'});const first=wb.SheetNames&&wb.SheetNames[0];if(!first)throw new Error('Excel sem folhas.');
        const ws=wb.Sheets[first];const aoa=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
        await _applyImportedContacts(_excelToContactsAOA(aoa));
      }catch(e){console.error(e);showToast('Erro ao importar: '+(e&&e.message?e.message:'ver consola'));}
    }

    async function _applyImportedContacts(imported){
      if(!Array.isArray(imported)||!imported.length){showToast('Excel sem contactos válidos.');return;}
      const lojaExisting=(contactsData||[]).filter(c=>c&&c.origem==='Loja');
      if(db&&isAdmin){
        try{
          showToast('A atualizar contactos online...');
          const snap=await db.collection('contacts').get();
          const deletes=[];snap.forEach(doc=>{const d=doc.data()||{};if((d.origem||')!=='Loja')deletes.push(doc.ref);});
          const chunk=(arr,size)=>{const out=[];for(let i=0;i<arr.length;i+=size)out.push(arr.slice(i,i+size));return out;};
          const commits=[];
          chunk(deletes,450).forEach(refs=>{if(!refs.length)return;const b=db.batch();refs.forEach(ref=>b.delete(ref));commits.push(b.commit());});
          chunk(imported,450).forEach(rows=>{const b=db.batch();rows.forEach(c=>{const id=c.id_mecanografico?'colab_'+c.id_mecanografico:null;const ref=id?db.collection('contacts').doc(id):db.collection('contacts').doc();b.set(ref,c,{merge:true});});commits.push(b.commit());});
          await Promise.all(commits);showToast('Contactos atualizados (online).');return;
        }catch(e){console.error(e);showToast('Falha ao atualizar online.');return;}
      }
      contactsData=[...lojaExisting,...imported];saveContactsData();applyFiltersContacts();
      showToast(db&&!isAdmin?'Importado localmente (faça login admin para aplicar online).':'Contactos importados (local).');
    }


    // ══════════════════════════════════════════
    // AUTH + INIT  ← SECURITY FIX: auth before loading data
    // ══════════════════════════════════════════
    function showLoginScreen() {
      loginScreen.style.display = 'flex';
      loadingScreen.classList.remove('visible');
      appScreen.classList.remove('visible');
    }

    function showLoadingScreen() {
      loginScreen.style.display = 'none';
      loadingScreen.classList.add('visible');
      appScreen.classList.remove('visible');
    }

    function showAppScreen() {
      loginScreen.style.display = 'none';
      loadingScreen.classList.remove('visible');
      appScreen.classList.add('visible');
    }

    function buildTopbarAdmin() {
      const topbarRight = document.getElementById('topbarRight');
      if (!topbarRight || document.getElementById('adminDot')) return;

      // Status dot + label
      const statusWrap = document.createElement('div'); statusWrap.className = 'admin-status';
      const dot = document.createElement('span'); dot.className = 'admin-dot'; dot.id = 'adminDot';
      const label = document.createElement('span'); label.className = 'admin-label'; label.id = 'adminLabel'; label.textContent = 'Admin';
      statusWrap.appendChild(dot); statusWrap.appendChild(label);

      // Import wrap + admin button
      const importWrap = document.createElement('span'); importWrap.className = 'import-wrap';
      const adminBtn = document.createElement('button'); adminBtn.type = 'button'; adminBtn.className = 'btn-admin'; adminBtn.id = 'adminBtn';
      adminBtn.innerHTML = '<i class="fa-solid fa-shield-halved"></i> <span id="adminBtnText">Logout</span>';

      const importInput = document.createElement('input'); importInput.type = 'file'; importInput.accept = '.xlsx,.xls,.csv'; importInput.className = 'import-input'; importInput.id = 'importInput';
      importInput.addEventListener('change', e => { const f=e.target&&e.target.files&&e.target.files[0]; if(f) importContactsFromFile(f); importInput.value=''; });
      importWrap.appendChild(adminBtn);

      function updateAdminUI() {
        const dot = document.getElementById('adminDot');
        const btnText = document.getElementById('adminBtnText');
        const label = document.getElementById('adminLabel');
        const imp = document.getElementById('importInput');
        if (isAdmin) {
          dot && (dot.className = 'admin-dot active');
          label && (label.textContent = 'Admin ativo');
          btnText && (btnText.textContent = 'Logout');
          adminBtn.classList.add('active');
          if (imp) imp.style.display = 'block';
          if (!document.getElementById('importInput')) { importWrap.appendChild(importInput); }
        } else {
          dot && (dot.className = 'admin-dot');
          label && (label.textContent = 'Só leitura');
          btnText && (btnText.textContent = 'Modo: só leitura');
          adminBtn.classList.remove('active');
        }
      }

      adminBtn.addEventListener('click', () => {
        if (!firebase || !firebase.auth) { showToast('Firebase indisponível.'); return; }
        firebase.auth().signOut().then(() => { isAdmin=false; showToast('Sessão terminada.'); showLoginScreen(); }).catch(e=>{console.error(e);showToast('Erro ao terminar sessão.');});
      });

      topbarRight.appendChild(statusWrap);
      topbarRight.appendChild(importWrap);
      updateAdminUI();

      // Drag & drop import
      if (!window.__tmbDrop) {
        window.__tmbDrop = true;
        window.addEventListener('dragover', ev=>ev.preventDefault());
        window.addEventListener('drop', ev=>{ ev.preventDefault(); const f=ev.dataTransfer&&ev.dataTransfer.files&&ev.dataTransfer.files[0]; if(f&&isAdmin) importContactsFromFile(f); });
      }
    }

    function initData() {
      if (db) {
        db.collection('contacts').orderBy('nome').onSnapshot(
          snapshot => {
            const docs = snapshot.docs||[];
            if (!docs.length && !contactsSeedDone && CONTACTS.length) {
              contactsSeedDone = true;
              const batch = db.batch();
              CONTACTS.forEach(c => { const ref=db.collection('contacts').doc(); batch.set(ref,c); });
              batch.commit().then(()=>console.log('CONTACTS seeded.')).catch(e=>console.error(e));
              return;
            }
            contactsData = docs.map(doc => ({id:doc.id,...doc.data()}));
            applyFiltersContacts();
          },
          error => { console.error(error); if(!contactsData.length){contactsData=loadContactsData();applyFiltersContacts();} }
        );
        db.collection('vehicles').orderBy('matricula').onSnapshot(
          snapshot => {
            const docs = snapshot.docs||[];
            if (!docs.length && !vehiclesSeedDone && VEHICLES.length) {
              vehiclesSeedDone = true;
              const batch = db.batch();
              VEHICLES.forEach(v => { const ref=db.collection('vehicles').doc(); batch.set(ref,v); });
              batch.commit().then(()=>console.log('VEHICLES seeded.')).catch(e=>console.error(e));
              return;
            }
            vehiclesData = docs.map(doc => ({id:doc.id,...doc.data()}));
            applyFiltersVehicles();
          },
          error => { console.error(error); if(!vehiclesData.length){vehiclesData=loadVehiclesData();applyFiltersVehicles();} }
        );
      } else {
        contactsData = loadContactsData(); vehiclesData = loadVehiclesData();
        applyFiltersContacts(); applyFiltersVehicles();
      }
    }

    // ── LOGIN FLOW ──
    if (loginBtn) {
      loginBtn.addEventListener('click', () => {
        if (!firebase || !firebase.auth) { showLoginError('Firebase indisponível.'); return; }
        const email = (loginEmailEl&&loginEmailEl.value||'').trim();
        const password = (loginPassEl&&loginPassEl.value||'');
        if (!email || !password) { showLoginError('Preenche email e password.'); return; }
        loginBtn.disabled = true; loginBtn.textContent = 'A entrar…';
        firebase.auth().signInWithEmailAndPassword(email, password)
          .then(() => {}) // onAuthStateChanged handles it
          .catch(err => { console.error(err); loginBtn.disabled=false; loginBtn.innerHTML='<i class="fa-solid fa-arrow-right-to-bracket"></i>&nbsp; Entrar'; showLoginError('Credenciais inválidas. Tenta novamente.'); });
      });
    }

    // Enter key on password
    loginPassEl && loginPassEl.addEventListener('keydown', e => { if(e.key==='Enter') loginBtn && loginBtn.click(); });
    loginEmailEl && loginEmailEl.addEventListener('keydown', e => { if(e.key==='Enter') loginPassEl && loginPassEl.focus(); });

    function showLoginError(msg) {
      if (!loginError) return;
      loginError.textContent = msg;
      loginError.classList.add('visible');
      setTimeout(() => loginError.classList.remove('visible'), 4000);
    }

    // ── FIREBASE AUTH STATE OBSERVER ──
    // This is the key security fix: app only shows AFTER auth confirmed
    if (firebase && firebase.auth) {
      showLoadingScreen();
      firebase.auth().onAuthStateChanged(user => {
        if (user) {
          isAdmin = true; // any authenticated user has full access (they must have creds)
          showAppScreen();
          buildTopbarAdmin();
          initData();
        } else {
          isAdmin = false;
          showLoginScreen();
        }
        // Reset login button just in case
        if (loginBtn) { loginBtn.disabled=false; loginBtn.innerHTML='<i class="fa-solid fa-arrow-right-to-bracket"></i>&nbsp; Entrar'; }
      });
    } else {
      // No Firebase: fallback to local data, skip auth
      showAppScreen();
      contactsData = loadContactsData(); vehiclesData = loadVehiclesData();
      applyFiltersContacts(); applyFiltersVehicles();
    }

    // PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./service-worker.js').catch(()=>{}));
    }

  </script>
</body>
